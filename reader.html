<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zenith Reader</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.1.5/jszip.min.js"></script>
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100 flex flex-col h-screen">

  <!-- Header -->
  <div class="bg-gray-800 px-6 py-3 flex items-center justify-between border-b border-gray-700 shrink-0">
    <button onclick="window.close()" class="text-gray-400 hover:text-white text-sm flex items-center gap-2">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
      Close
    </button>
    <h1 id="book-title" class="text-sm font-medium text-gray-300 truncate max-w-md">Loading...</h1>
    <div id="page-info" class="text-xs text-gray-500 font-mono w-24 text-right"></div>
  </div>

  <!-- EPUB Viewer — Shadow DOM renders book content here, isolated from page CSS -->
  <div id="viewer" class="flex-1 min-h-0 bg-white overflow-y-auto"></div>

  <!-- Nav Bar -->
  <div class="bg-gray-800 border-t border-gray-700 flex items-center justify-center gap-6 py-3 shrink-0">
    <button id="btn-prev" onclick="prevPage()"
      class="px-6 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
      disabled>← Previous</button>
    <button id="btn-next" onclick="nextPage()"
      class="px-6 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded-lg transition-colors disabled:opacity-40 disabled:cursor-not-allowed"
      disabled>Next →</button>
  </div>

  <!-- Loading overlay -->
  <div id="loading" class="absolute inset-0 bg-gray-900 flex flex-col items-center justify-center gap-4 z-50">
    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-500"></div>
    <p id="loading-msg" class="text-gray-400 text-sm">Loading book...</p>
  </div>

  <script>
    const DB_NAME = 'InfoDepo';
    const STORE_NAME = 'books';

    let zip = null;
    let spine = [];       // ordered hrefs from OPF spine
    let opfDir = '';      // directory containing the OPF file
    let currentIndex = 0;
    const blobCache = {};
    let shadowRoot = null;

    function setLoading(msg) {
      document.getElementById('loading-msg').textContent = msg;
    }
    function hideLoading() {
      document.getElementById('loading').style.display = 'none';
    }
    function showError(msg) {
      const el = document.getElementById('loading-msg');
      el.textContent = msg;
      el.className = 'text-red-400 text-sm text-center max-w-sm';
      document.querySelector('#loading .animate-spin')?.remove();
    }

    function prevPage() {
      if (currentIndex > 0) renderChapter(--currentIndex);
    }
    function nextPage() {
      if (currentIndex < spine.length - 1) renderChapter(++currentIndex);
    }

    // Resolve a relative URL against a base path within the zip
    function resolveHref(base, href) {
      if (!href || href.startsWith('data:') || /^https?:\/\//.test(href)) return href;
      if (href.startsWith('/')) return href.slice(1);
      const baseDir = base.includes('/') ? base.substring(0, base.lastIndexOf('/') + 1) : '';
      const stack = (baseDir + href).split('/');
      const result = [];
      for (const seg of stack) {
        if (seg === '..') result.pop();
        else if (seg !== '.') result.push(seg);
      }
      return result.join('/');
    }

    async function getBlobUrl(path) {
      if (blobCache[path]) return blobCache[path];
      const file = zip.file(path);
      if (!file) return null;
      const blob = await file.async('blob');
      const url = URL.createObjectURL(blob);
      blobCache[path] = url;
      return url;
    }

    // Rewrite url(...) references inside CSS to blob URLs
    async function replaceCssUrls(css, cssPath) {
      const matches = [...css.matchAll(/url\(['"]?([^'")\s]+)['"]?\)/g)];
      for (const match of matches) {
        const original = match[1];
        if (original.startsWith('data:') || /^https?:\/\//.test(original)) continue;
        const resolved = resolveHref(cssPath, original);
        const blobUrl = await getBlobUrl(resolved);
        if (blobUrl) css = css.replace(match[0], `url('${blobUrl}')`);
      }
      return css;
    }

    async function renderChapter(index) {
      const chapterHref = spine[index];
      const chapterPath = opfDir ? opfDir + '/' + chapterHref : chapterHref;

      const file = zip.file(chapterPath);
      if (!file) { console.error('Chapter file not found:', chapterPath); return; }

      const html = await file.async('string');
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');

      // Rewrite img/image src to blob URLs
      for (const el of doc.querySelectorAll('[src]')) {
        const src = el.getAttribute('src');
        if (src && !src.startsWith('data:') && !/^https?:\/\//.test(src)) {
          const resolved = resolveHref(chapterPath, src);
          const url = await getBlobUrl(resolved);
          if (url) el.setAttribute('src', url);
        }
      }

      // Collect styles: inline <style> tags + external <link rel="stylesheet">
      const styles = [];
      for (const el of doc.querySelectorAll('style')) {
        styles.push(await replaceCssUrls(el.textContent, chapterPath));
      }
      for (const el of doc.querySelectorAll('link[rel="stylesheet"][href]')) {
        const href = el.getAttribute('href');
        const cssPath = resolveHref(chapterPath, href);
        const cssFile = zip.file(cssPath);
        if (cssFile) {
          let css = await cssFile.async('string');
          css = await replaceCssUrls(css, cssPath);
          styles.push(css);
        }
      }

      // Initialise shadow root once
      if (!shadowRoot) {
        shadowRoot = document.getElementById('viewer').attachShadow({ mode: 'open' });
      }

      // Clear previous content
      while (shadowRoot.firstChild) shadowRoot.removeChild(shadowRoot.firstChild);

      // Base readability styles (scoped to shadow DOM, won't leak to page)
      const baseStyle = document.createElement('style');
      baseStyle.textContent = `
        :host { display: block; }
        /* position:relative contains any absolutely-positioned elements from book CSS
           so they cannot escape the shadow root and overlap page chrome (e.g. nav buttons) */
        .epub-content {
          position: relative;
          overflow: hidden;
          max-width: 720px;
          margin: 0 auto;
          padding: 2rem 2.5rem;
          font-family: Georgia, 'Times New Roman', serif;
          font-size: 1.05rem;
          line-height: 1.8;
          color: #111;
        }
        img { max-width: 100%; height: auto; display: block; margin: 0 auto; }
        a { color: #4f46e5; }
        p { margin: 0 0 0.8em; }
        h1, h2, h3, h4, h5, h6 { margin: 1.2em 0 0.4em; line-height: 1.3; }
        /* Hide Kindle-specific zoom overlays that serve no purpose here */
        #PV, .PV-P { display: none !important; }
      `;
      shadowRoot.appendChild(baseStyle);

      // Book-supplied styles
      for (const css of styles) {
        const s = document.createElement('style');
        s.textContent = css;
        shadowRoot.appendChild(s);
      }

      // Chapter content
      const content = document.createElement('div');
      content.className = 'epub-content';
      content.innerHTML = doc.body.innerHTML;
      shadowRoot.appendChild(content);

      // Scroll to top
      document.getElementById('viewer').scrollTop = 0;

      // Update UI
      document.getElementById('page-info').textContent = `${index + 1} / ${spine.length}`;
      document.getElementById('btn-prev').disabled = index === 0;
      document.getElementById('btn-next').disabled = index === spine.length - 1;
    }

    const bookId = parseInt(new URLSearchParams(location.search).get('id'));
    if (!bookId) {
      showError('No book ID provided.');
    } else {
      loadAndRender(bookId);
    }

    async function loadAndRender(id) {
      setLoading('Opening database...');
      const db = await new Promise((resolve, reject) => {
        const req = indexedDB.open(DB_NAME, 1);
        req.onsuccess = e => resolve(e.target.result);
        req.onerror = e => reject(e.target.error);
      }).catch(err => { showError(`DB error: ${err.message}`); return null; });
      if (!db) return;

      setLoading('Loading book data...');
      const book = await new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, 'readonly');
        const req = tx.objectStore(STORE_NAME).get(id);
        req.onsuccess = e => resolve(e.target.result);
        req.onerror = e => reject(e.target.error);
      }).catch(err => { showError(`Could not load book: ${err.message}`); return null; });

      if (!book) { showError('Book not found in library.'); return; }

      document.title = book.name;
      document.getElementById('book-title').textContent = book.name;

      setLoading('Parsing EPUB...');
      try {
        const arrayBuffer = await book.data.arrayBuffer();
        zip = await JSZip.loadAsync(arrayBuffer);

        // Step 1: Find OPF path from META-INF/container.xml
        const containerXml = await zip.file('META-INF/container.xml').async('string');
        const opfPath = containerXml.match(/full-path="([^"]+)"/)?.[1];
        if (!opfPath) throw new Error('Cannot find OPF path in container.xml');

        opfDir = opfPath.includes('/') ? opfPath.substring(0, opfPath.lastIndexOf('/')) : '';

        // Step 2: Parse OPF — build manifest map and ordered spine
        const opfXml = await zip.file(opfPath).async('string');
        const opfDoc = new DOMParser().parseFromString(opfXml, 'application/xml');

        const manifestMap = {};
        for (const item of opfDoc.querySelectorAll('manifest item')) {
          manifestMap[item.getAttribute('id')] = item.getAttribute('href');
        }

        spine = [];
        for (const itemref of opfDoc.querySelectorAll('spine itemref')) {
          const href = manifestMap[itemref.getAttribute('idref')];
          if (href) spine.push(href);
        }

        if (spine.length === 0) throw new Error('No spine items found in EPUB');

        // Use dc:title from metadata if available
        const titleEl =
          opfDoc.querySelector('title') ||
          opfDoc.getElementsByTagNameNS('http://purl.org/dc/elements/1.1/', 'title')[0];
        if (titleEl?.textContent) {
          document.title = titleEl.textContent;
          document.getElementById('book-title').textContent = titleEl.textContent;
        }

        currentIndex = 0;
        await renderChapter(0);
        hideLoading();

      } catch (err) {
        showError(`Failed to render EPUB: ${err.message}`);
        console.error(err);
      }
    }
  </script>
</body>
</html>
